<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gradsquad - Planning</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root{
      --bg:#0f1416;
      --card:#15191b;
      --card-2:#0d1112;
      --muted:#8f9aa0;
      --text:#eef2f3;
      --accent:#2a9d8f;
      --sidebar-width:220px;
    }

    html, body {
      margin:0;
      height:100%;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0b0d0e 0%, var(--bg) 100%);
      color: var(--text);
    }

    header.app-header {
      position: fixed;
      top:0;
      left: var(--sidebar-width);
      right:0;
      height: 68px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.08));
      backdrop-filter: blur(6px);
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    header.app-header h1 {
      margin:0;
      font-size:26px;
      letter-spacing:0.6px;
      font-weight:700;
      text-align:center;
    }

    main.container {
      max-width:900px;
      margin: 92px auto 40px;
      margin-left: calc(var(--sidebar-width) + 20px);
      padding:24px;
      background: var(--card);
      border-radius:12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.6);
    }

    .section {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .section:last-child {
      border-bottom: none;
    }

    .section h2 {
      font-size: 18px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 16px;
      color: var(--text);
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-group input,
    .input-group select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      background: var(--card-2);
      color: var(--text);
      font-size: 14px;
      font-family: Inter, Arial, sans-serif;
    }

    .input-group input::placeholder {
      color: var(--muted);
    }

    .input-group button {
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .input-group button:hover {
      opacity: 0.9;
    }

    .input-group button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .place-item {
      background: linear-gradient(180deg, var(--card-2) 0%, rgba(13, 17, 18, 0.6) 100%);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .place-info {
      flex: 1;
    }

    .place-name {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
    }

    .place-votes {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .place-highest {
      color: var(--accent);
      font-weight: 600;
    }

    .vote-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: opacity 0.2s ease;
    }

    .vote-btn:hover {
      opacity: 0.9;
    }

    .vote-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .time-slot {
      background: linear-gradient(180deg, var(--card-2) 0%, rgba(13, 17, 18, 0.6) 100%);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .time-slot-header {
      font-weight: 600;
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .attendee {
      font-size: 13px;
      color: var(--text);
      padding: 4px 0;
      margin-left: 8px;
    }

    .attendee::before {
      content: "• ";
      color: var(--muted);
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 20px;
      font-size: 14px;
    }

    .info-banner {
      background: rgba(42, 157, 143, 0.1);
      border: 1px solid rgba(42, 157, 143, 0.3);
      padding: 12px;
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Planning</h1>
  </header>

  <main class="container">
    <!-- Place Voting Section -->
    <div class="section">
      <h2>📍 Where should we go?</h2>
      
      <div class="input-group">
        <input type="text" id="placeInput" placeholder="Suggest a place...">
        <button onclick="addPlace()">Add Place</button>
      </div>

      <div id="placesList"></div>
    </div>

    <!-- Time Voting Section -->
    <div class="section">
      <h2>⏰ What time are you coming?</h2>
      
      <div class="input-group">
        <input type="time" id="timeInput">
        <button onclick="addTime()">Add Time</button>
      </div>

      <div id="timesList"></div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="sidebar.js"></script>
  <script>
    const socket = io();
    const nickname = localStorage.getItem('nickname');
    let eventId = null; // To be set when selecting an event
    let isPollActive = true; // Track if poll is still active

    loadSidebar(true);

    // Load places on page load
    async function loadPlaces() {
      try {
        const res = await fetch('/places');
        const places = await res.json();
        renderPlaces(places);
        checkPollStatus();
      } catch (err) {
        console.error("Failed to load places:", err);
      }
    }

    // Load times on page load
    async function loadTimes() {
      try {
        const res = await fetch('/times');
        const times = await res.json();
        renderTimes(times);
      } catch (err) {
        console.error("Failed to load times:", err);
      }
    }

    function renderPlaces(places) {
      const container = document.getElementById('placesList');
      if (!places || places.length === 0) {
        container.innerHTML = '<div class="empty-state">No places suggested yet. Be the first!</div>';
        return;
      }

      const maxVotes = Math.max(...places.map(p => p.votes || 0), 0);
      container.innerHTML = places.map(place => `
        <div class="place-item">
          <div class="place-info">
            <div class="place-name">${place.name}</div>
            <div class="place-votes">
              ${place.votes || 0} vote${place.votes !== 1 ? 's' : ''}
              ${place.votes === maxVotes && maxVotes > 0 ? '<span class="place-highest"> • Most Voted! 🎯</span>' : ''}
            </div>
          </div>
          <button class="vote-btn" onclick="votePlace('${place._id}')" ${!isPollActive ? 'disabled' : ''}>+1 Vote</button>
        </div>
      `).join('');
    }

    function renderTimes(times) {
      const container = document.getElementById('timesList');
      if (!times || times.length === 0) {
        container.innerHTML = '<div class="empty-state">No times set yet. Add yours!</div>';
        return;
      }

      // Group times by time slot
      const grouped = {};
      times.forEach(t => {
        if (!grouped[t.time]) grouped[t.time] = [];
        grouped[t.time].push(t.nickname);
      });

      // Sort by time
      const sorted = Object.keys(grouped).sort();
      container.innerHTML = sorted.map(time => `
        <div class="time-slot">
          <div class="time-slot-header">🕐 ${time}</div>
          ${grouped[time].map(nick => `<div class="attendee">${nick}</div>`).join('')}
        </div>
      `).join('');
    }

    function checkPollStatus() {
      // Check if there's an active event with a future date
      // For now, assume polls are always active unless event has passed
      isPollActive = true;
    }

    async function addPlace() {
      const input = document.getElementById('placeInput');
      const place = input.value.trim();

      if (!place) {
        alert('Please enter a place name');
        return;
      }

      try {
        const res = await fetch('/places', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: place })
        });
        const data = await res.json();
        if (data.success) {
          input.value = '';
          loadPlaces();
          socket.emit('places updated');
        }
      } catch (err) {
        console.error("Failed to add place:", err);
      }
    }

    async function votePlace(placeId) {
      try {
        const res = await fetch(`/places/${placeId}/vote`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname })
        });
        const data = await res.json();
        if (data.success) {
          loadPlaces();
          socket.emit('places updated');
        }
      } catch (err) {
        console.error("Failed to vote:", err);
      }
    }

    async function addTime() {
      const input = document.getElementById('timeInput');
      const time = input.value.trim();

      if (!time) {
        alert('Please select a time');
        return;
      }

      try {
        const res = await fetch('/times', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ time, nickname })
        });
        const data = await res.json();
        if (data.success) {
          input.value = '';
          loadTimes();
          socket.emit('times updated');
        }
      } catch (err) {
        console.error("Failed to add time:", err);
      }
    }

    // Socket listeners for real-time updates
    socket.on('places updated', () => loadPlaces());
    socket.on('times updated', () => loadTimes());

    // Load on page load
    loadPlaces();
    loadTimes();

    // Emit join planning event
    if (nickname) {
      socket.emit('join planning', { nickname });
    }

    window.addEventListener('beforeunload', () => {
      if (nickname) {
        socket.emit('leave planning', { nickname });
      }
    });
     var script = document.createElement('script');
    script.src = 'background-music.html';
    document.head.appendChild(script);
     var script = document.createElement('script');
  </script>
</body>
</html>
